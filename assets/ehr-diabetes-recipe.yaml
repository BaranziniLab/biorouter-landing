version: 1.0.0
title: EHR Diabetes Demographics and Reporting Dashboard
description: A recipe for querying an OMOP-based EHR to derive a disease cohort (e.g., T2D), summarize demographics, and produce sharable visual outputs.
instructions: Use an OMOP CDM clinical database to identify a patient cohort via diagnosis concepts (e.g., matching condition_occurrence to relevant concepts in concept). Then, join to person to obtain demographics (gender, age via year_of_birth, race, ethnicity) and compute counts and percentages. Present results as both a concise HTML report and, optionally, an interactive R Shiny dashboard with charts and tables. When tooling is available, run SELECT-only queries through a clinical data extension (e.g., medcp.query_clinical_records), and use a system automation/file tool (e.g., computercontroller.automation_script or computercontroller.computer_control) to generate files on disk (HTML and an R Shiny app folder). Make output locations explicit (e.g., /Users/<user>/Desktop) and ensure visualizations include clear labels and percentages.
extensions: []
activities:
  - Count disease cohort
  - Demographic breakdowns
  - Generate HTML report
  - Build Shiny dashboard
  - Age distribution analysis
parameters: []
